<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Web AR Test</title>
    <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.0.x/dist/aframe-particle-system-component.min.js"></script>
    <script>
      AFRAME.registerComponent("collide", {
        init: function() {
          this.el.addEventListener("click", this.onClick);
        },
        onClick: function(e) {
          var createEffect = function(point, particleAge) {
            var pointStr = point.x + " " + point.y + " " + point.z;
            var effect = document.createElement("a-entity");
            effect.setAttribute("position", pointStr);
            effect.setAttribute("raycaster", "enabled: false");
            effect.setAttribute(
              "particle-system",
              "color: #ff0, #ff9;maxParticleCount: 100;maxAge: " +
                particleAge / 1000 +
                ";velocityValue:0 -1 0; accelerationValue: 0 0.5 0; duration: 1;"
            );
            return effect;
          };
          var point = e.detail.intersection.point;
          var particleAge = 1500;
          var effect = createEffect(point, particleAge);
          var scene = document.querySelector("a-scene");
          scene.appendChild(effect);
          setTimeout(function() {
            scene.removeChild(effect);
          }, particleAge);
        }
      });
    </script>
    <style>
      #newPaintCanvas {
        display: none;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <button
      style="position: fixed; top: 90%; left: 50%; width: 200px; height: 50px; z-index: 500 !important;"
      onclick="document.getElementById('newPaintCanvas').style.display = 'block'"
    >
      Add new paint
    </button>

    <canvas
      id="newPaintCanvas"
      style="position: fixed; top: 0; left: 0; width: 300px; height: 500px; z-index: 1000 !important; background-color: #fff"
    ></canvas>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <img id="example_img" src="waseda.png" />
      </a-assets>

      <a-marker preset="hiro">
        <a-entity cursor="rayOrigin: mouse"></a-entity>
        <a-image
          src="#example_img"
          width="5"
          height="5"
          position="0 -15 0"
          rotation="-90 0 0"
          collide
        ></a-image>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
