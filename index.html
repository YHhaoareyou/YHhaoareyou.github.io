<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Web AR Test</title>

    <!-- The core Firebase JS SDK is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/8.1.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.1.1/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.1.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.1.1/firebase-analytics.js"></script>

    <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.0.x/dist/aframe-particle-system-component.min.js"></script>

    <script>
      // Your web app's Firebase configuration
      // For Firebase JS SDK v7.20.0 and later, measurementId is optional
      var firebaseConfig = {
        apiKey: "AIzaSyAA4zXM0wRBrL1l65NHg_8mQcjg75ew9RQ",
        authDomain: "campus-coloring.firebaseapp.com",
        databaseURL: "https://campus-coloring.firebaseio.com",
        projectId: "campus-coloring",
        storageBucket: "campus-coloring.appspot.com",
        messagingSenderId: "45926036058",
        appId: "1:45926036058:web:a9271137ac86762843de63",
        measurementId: "G-WPPW3TX4QG"
      };
      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      firebase.analytics();
      var storage = firebase.storage();
      var database = firebase.database();

      function closeCanvas() {
        document.getElementById("newPaintCanvas").style.display = "none";
        document.getElementById("closeCanvasButton").style.display = "none";
        document.getElementById("colorPanel").style.display = "none";
      }

      function saveCanvas(canvas, locationName) {
        var imageName = prompt("Please enter image name");
        canvas.toBlob(function(blob) {
          var image = new Image();
          image.src = blob;
          const uploadTimestamp = Date.now();
          var uploadTask = storage
            .ref()
            .child("images/" + imageName)
            .put(blob)
            .then(snapshot => {
              return snapshot.ref.getDownloadURL();
            })
            .then(imageUrl => {
              database
                .ref()
                .child(locationName + "/" + uploadTimestamp)
                .set({
                  name: imageName,
                  url: imageUrl,
                  timestamp: uploadTimestamp,
                  user: "tester"
                })
                .then(function(snap) {
                  alert("Uploaded!");
                })
                .catch(error => {
                  alert(error);
                });
            });
        });
        // var canvasDataURL = canvas.toDataURL();
        // var a = document.createElement("a");
        // a.href = canvasDataURL;
        // a.download = imageName || "drawing";
        // a.click();
      }

      AFRAME.registerComponent("markerhandler", {
        init: function() {
          this.el.sceneEl.addEventListener("markerFound", e => {
            const locationName = e.target.getAttribute("location");
            document
              .getElementById("example_img")
              .setAttribute("src", "honkyan.jpg");

            if (
              document.getElementById("newPaintCanvas").style.display !==
              "block"
            ) {
              var openCanvasButton = document.getElementById(
                "openCanvasButton"
              );
              openCanvasButton.style.display = "block";
              openCanvasButton.addEventListener("click", e => {
                openCanvasButton.style.display = "none";
                document.getElementById("newPaintCanvas").style.display =
                  "block";
                document.getElementById("closeCanvasButton").style.display =
                  "block";
                document.getElementById("colorPanel").style.display = "block";
                document
                  .getElementById("save")
                  .setAttribute("name", locationName);
              });
            }
          });
          this.el.sceneEl.addEventListener("markerLost", e => {
            var openCanvasButton = document.getElementById("openCanvasButton");
            openCanvasButton.style.display = "none";
          });
        }
      });

      // AFRAME.registerComponent("collide", {
      //   init: function() {
      //     this.el.addEventListener("click", this.onClick);
      //   },
      //   onClick: function(e) {
      //     // show canvas
      //     document.getElementById("newPaintCanvas").style.display = "block";
      //     document.getElementById("closeCanvasButton").style.display = "block";
      //     document.getElementById("colorPanel").style.display = "block";
      //     const locationName = e.target.getAttribute("name");
      //     document.getElementById("save").setAttribute("name", locationName);
      //   }
      // });

      window.onload = function() {
        database
          .ref("location1")
          .once("value")
          .then(snap => {
            Object.keys(snap.val()).forEach(key => {
              document
                .getElementById("a_assets")
                .appendChild(
                  "<img id='" + key + "' src='" + snap.val()[key].url + "' />"
                );
              document
                .getElementById("nft_location1")
                .appendChild(
                  "<a-image src='" +
                    key +
                    "' width='100' height='100' position='50 -50 -100' rotation='-90 0 0'></a-image>"
                );
            });
          });
        var canvas = document.getElementById("newPaintCanvas");
        var context = canvas.getContext("2d");
        var boundings = canvas.getBoundingClientRect();

        var mouseX = 0;
        var mouseY = 0;
        context.strokeStyle = "black";
        context.lineWidth = 3;
        var isDrawing = false;

        var colors = document.getElementsByClassName("colors")[0];

        colors.addEventListener("click", function(event) {
          context.strokeStyle = event.target.value || "#000000";
        });

        var brushes = document.getElementsByClassName("brushes")[0];

        brushes.addEventListener("click", function(event) {
          context.lineWidth = event.target.value || 3;
        });

        canvas.addEventListener("touchstart", function(event) {
          setMouseCoordinates(event);
          isDrawing = true;

          context.beginPath();
          context.moveTo(mouseX, mouseY);
        });

        canvas.addEventListener("touchmove", function(event) {
          setMouseCoordinates(event);

          if (isDrawing) {
            context.lineTo(mouseX, mouseY);
            context.stroke();
          }
        });

        canvas.addEventListener("touchend", function(event) {
          setMouseCoordinates(event);
          isDrawing = false;
        });

        function setMouseCoordinates(event) {
          mouseX = event.touches[0].clientX - boundings.left;
          mouseY = event.touches[0].clientY - boundings.top;
        }

        var clearButton = document.getElementById("clear");

        clearButton.addEventListener("click", function() {
          context.clearRect(0, 0, canvas.width, canvas.height);
        });

        var saveButton = document.getElementById("save");

        saveButton.addEventListener("click", e => {
          const locationName = e.target.getAttribute("name");
          saveCanvas(canvas, locationName);
        });
      };
    </script>

    <style>
      #openCanvasButton {
        display: none;
        position: fixed;
        top: 90%;
        left: 0%;
        width: 200px;
        height: 50px;
        z-index: 500 !important;
      }
      #closeCanvasButton {
        display: none;
        position: fixed;
        top: 90%;
        left: 50%;
        width: 200px;
        height: 50px;
        z-index: 500 !important;
      }
      #newPaintCanvas {
        display: none;
        border: 3px solid #fff;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1000 !important;
        background-color: transparent;
        cursor: crosshair;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      }
      #colorPanel {
        width: 160px;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1001 !important;
        display: none;
      }

      .colors {
        background-color: #ece8e8;
        text-align: center;
        padding-bottom: 5px;
        padding-top: 10px;
      }

      .colors button {
        display: inline-block;
        border: 1px solid #00000026;
        border-radius: 0;
        outline: none;
        cursor: pointer;
        width: 20px;
        height: 20px;
        margin-bottom: 5px;
      }

      .colors button:nth-of-type(1) {
        background-color: rgb(255, 0, 0);
      }

      .colors button:nth-of-type(2) {
        background-color: rgb(0, 255, 0);
      }

      .colors button:nth-of-type(3) {
        background-color: rgb(0, 0, 255);
      }

      .brushes {
        padding-top: 5px;
      }

      .brushes button {
        display: block;
        width: 100%;
        border: 0;
        border-radius: 0;
        background-color: #ece8e8;
        margin-bottom: 5px;
        padding: 5px;
        height: 30px;
        outline: none;
        position: relative;
        cursor: pointer;
      }

      .brushes button:after {
        height: 1px;
        display: block;
        background: #808080;
        content: "";
      }

      .brushes button:nth-of-type(1):after {
        height: 1px;
      }

      .brushes button:nth-of-type(2):after {
        height: 3px;
      }

      .brushes button:nth-of-type(3):after {
        height: 5px;
      }

      .buttons {
        height: 80px;
        padding-top: 10px;
      }

      .buttons button {
        display: block;
        width: 100%;
        border: 0;
        border-radius: 0;
        background-color: #ece8e8;
        margin-bottom: 5px;
        padding: 5px;
        height: 30px;
        outline: none;
        position: relative;
        cursor: pointer;
        font-size: 16px;
      }
    </style>
  </head>

  <body style="width: 100%; margin: 0; overflow: hidden;">
    <!-- <button id="newCanvasButton" onclick="showCanvas()">
      Add new paint
    </button> -->
    <button id="closeCanvasButton" onclick="closeCanvas()">
      Close canvas
    </button>
    <button id="openCanvasButton">
      Create new painting
    </button>

    <div id="colorPanel">
      <div class="colors">
        <button type="button" value="rgb(255, 0, 0)"></button>
        <button type="button" value="rgb(0, 255, 0)"></button>
        <button type="button" value="rgb(0, 0, 255)"></button>
      </div>
      <div class="brushes">
        <button type="button" value="1"></button>
        <button type="button" value="3"></button>
        <button type="button" value="5"></button>
      </div>
      <div class="buttons">
        <button id="clear" type="button">Clear</button>
        <button id="save" type="button" name="">Save</button>
      </div>
    </div>

    <canvas id="newPaintCanvas" width="350" height="500"></canvas>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets id="a_assets">
        <img id="example_img" src="waseda.png" />
      </a-assets>

      <a-nft
        markerhandler
        type="nft"
        url="descriptors/blg51"
        smooth="true"
        smoothCount="10"
        smoothTolerance=".01"
        smoothThreshold="5"
        location="location1"
        id="nft_location1"
      >
        <a-entity cursor="rayOrigin: mouse"></a-entity>
        <a-image
          src="#example_img"
          width="100"
          height="100"
          position="50 -50 -100"
          rotation="-90 0 0"
        ></a-image>
      </a-nft>

      <a-nft
        markerhandler
        type="nft"
        url="descriptors/takeuchi"
        smooth="true"
        smoothCount="10"
        smoothTolerance=".01"
        smoothThreshold="5"
        location="location2"
      >
        <a-entity cursor="rayOrigin: mouse"></a-entity>
        <a-image
          src="#example_img"
          width="100"
          height="100"
          position="50 -50 -100"
          rotation="-90 0 180"
        ></a-image>
      </a-nft>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
