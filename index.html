<!DOCTYPE html>
<html>
  <!-- include aframe -->
  <!-- with location based, use aframe v0.9.2 -->
  <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
  <!-- include ar.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-box
        color="red"
        gps-entity-place="latitude: 35.6981500; longitude: 139.6634200;"
      />
      <a-box
        color="yellow"
        gps-entity-place="latitude: 35.6981000; longitude: 139.6634200;"
      />
      <a-box
        color="green"
        gps-entity-place="latitude: 35.6980500; longitude: 139.6634200;"
      />

      <a-box
        color="blue"
        gps-entity-place="latitude: '35.6981500'; longitude: '139.6634250';"
      />
      <a-box
        color="orange"
        gps-entity-place="latitude: '35.6981000'; longitude: '139.6634250';"
      />
      <a-box
        color="white"
        gps-entity-place="latitude: '35.6980500'; longitude: '139.6634250';"
      />
      <a-camera gps-camera rotation-reader> </a-camera>
    </a-scene>
  </body>
</html>
