<!DOCTYPE html>
<html>
  <head>
    <!-- include aframe -->
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <!-- include ar.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script>
      AFRAME.registerComponent("collide", {
        init: function() {
          this.interactiveAnimations();
          // this.el.addEventListener("click", this.onClick);
        },
        interactiveAnimations: function() {
          this.el.setAttribute(
            "animation__mouseenter",
            "property: scale; to: 1.5 1.5 1.5; startEvents: mouseenter; dur: 200"
          );
          this.el.setAttribute(
            "animation__mouseleave",
            "property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200"
          );
          this.el.setAttribute(
            "animation__click",
            "property: scale; to: 3 3 3; startEvents: click; dur:200"
          );
        }

        //         particleAge / 1000 +

        //   setTimeout(function() {

      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true;"
      embedded
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
    >
      <a-assets>
        <img id="example_img" src="waseda.png" />
      </a-assets>
      <a-entity cursor="rayOrigin: mouse"></a-entity>

      <a-image
        src="#example_img"
        width="5"
        height="5"
        position="0 -15 5"
        rotation="-90 0 0"
      ></a-image>
      <a-box
        position="0 -10 5"
        rotation="-0 0 0"
        width="3"
        height="1"
        color="#333"
        collide
      ></a-box>
      <a-marker-camera preset="hiro"></a-marker-camera>
    </a-scene>
  </body>
</html>
