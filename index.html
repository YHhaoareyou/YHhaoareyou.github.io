<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Web AR Test</title>
    <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.0.x/dist/aframe-particle-system-component.min.js"></script>
    <script>
      AFRAME.registerComponent("collide", {
        init: function() {
          this.el.addEventListener("click", this.onClick);
        },
        onClick: function(e) {
          var createEffect = function(point, particleAge) {
            var pointStr = point.x + " " + point.y + " " + point.z;
            var effect = document.createElement("a-entity");
            effect.setAttribute("position", pointStr);
            effect.setAttribute("raycaster", "enabled: false");
            effect.setAttribute(
              "particle-system",
              "color: #ff0, #ff9;maxParticleCount: 100;maxAge: " +
                particleAge / 1000 +
                ";velocityValue:0 -1 0; accelerationValue: 0 0.5 0; duration: 1;"
            );
            return effect;
          };
          var point = e.detail.intersection.point;
          var particleAge = 1500;
          var effect = createEffect(point, particleAge);
          var scene = document.querySelector("a-scene");
          scene.appendChild(effect);
          setTimeout(function() {
            scene.removeChild(effect);
          }, particleAge);
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      style="z-index: 0"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true;"
      embedded
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
      style="width: 300px; height: 500px;"
    >
      <a-assets>
        <img id="example_img" src="waseda.png" />
      </a-assets>
      <a-entity cursor="rayOrigin: mouse"></a-entity>

      <a-image
        src="#example_img"
        width="3"
        height="3"
        position="0 -15 0"
        rotation="-90 0 0"
        collide
      ></a-image>
      <a-box
        position="0 -10 0"
        rotation="-0 0 0"
        width="2"
        height="1"
        color="#333"
        collide
      ></a-box>
      <a-marker-camera preset="hiro"></a-marker-camera>
    </a-scene>
    <button style="z-index: 100">123456789</button>
  </body>
</html>
