<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Web AR Test</title>
    <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.0.x/dist/aframe-particle-system-component.min.js"></script>
    <script>
      function showCanvas() {
        document.getElementById("newPaintCanvas").style.display = "block";
      }
      AFRAME.registerComponent("collide", {
        init: function() {
          this.el.addEventListener("click", this.onClick);
        },
        onClick: function(e) {
          var createEffect = function(point, particleAge) {
            var pointStr = point.x + " " + point.y + " " + point.z;
            var effect = document.createElement("a-entity");
            effect.setAttribute("position", pointStr);
            effect.setAttribute("raycaster", "enabled: false");
            effect.setAttribute(
              "particle-system",
              "color: #ff0, #ff9;maxParticleCount: 100;maxAge: " +
                particleAge / 1000 +
                ";velocityValue:0 -1 0; accelerationValue: 0 0.5 0; duration: 1;"
            );
            return effect;
          };
          var point = e.detail.intersection.point;
          var particleAge = 1500;
          var effect = createEffect(point, particleAge);
          var scene = document.querySelector("a-scene");
          scene.appendChild(effect);
          setTimeout(function() {
            scene.removeChild(effect);
          }, particleAge);
        }
      });

      window.onload = function() {
        var canvas = document.getElementById("newPaintCanvas");
        var context = canvas.getContext("2d");
        var boundings = canvas.getBoundingClientRect();

        var mouseX = 0;
        var mouseY = 0;
        context.strokeStyle = "black";
        context.lineWidth = 1;
        var isDrawing = false;

        var colors = document.getElementsByClassName("colors")[0];

        colors.addEventListener("click", function(event) {
          context.strokeStyle = event.target.value || "black";
        });

        var brushes = document.getElementsByClassName("brushes")[0];

        brushes.addEventListener("click", function(event) {
          context.lineWidth = event.target.value || 1;
        });

        canvas.addEventListener("mousedown", function(event) {
          setMouseCoordinates(event);
          isDrawing = true;

          context.beginPath();
          context.moveTo(mouseX, mouseY);
        });

        canvas.addEventListener("mousemove", function(event) {
          setMouseCoordinates(event);

          if (isDrawing) {
            context.lineTo(mouseX, mouseY);
            context.stroke();
          }
        });

        canvas.addEventListener("mouseup", function(event) {
          setMouseCoordinates(event);
          isDrawing = false;
        });

        function setMouseCoordinates(event) {
          mouseX = event.clientX - boundings.left;
          mouseY = event.clientY - boundings.top;
        }

        var clearButton = document.getElementById("clear");

        clearButton.addEventListener("click", function() {
          context.clearRect(0, 0, canvas.width, canvas.height);
        });

        var saveButton = document.getElementById("save");

        saveButton.addEventListener("click", function() {
          var imageName = prompt("Please enter image name");
          var canvasDataURL = canvas.toDataURL();
          var a = document.createElement("a");
          a.href = canvasDataURL;
          a.download = imageName || "drawing";
          a.click();
        });
      };
    </script>

    <style>
      #newCanvasButton {
        position: fixed;
        top: 90%;
        left: 50%;
        width: 200px;
        height: 50px;
        z-index: 500 !important;
      }
      #newPaintCanvas {
        display: none;
        border: 1px solid #000000;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1000 !important;
        background-color: #fff;
        cursor: crosshair;
      }
      #colorPanel {
        width: 160px;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1001 !important;
      }

      .colors {
        background-color: #ece8e8;
        text-align: center;
        padding-bottom: 5px;
        padding-top: 10px;
      }

      .colors button {
        display: inline-block;
        border: 1px solid #00000026;
        border-radius: 0;
        outline: none;
        cursor: pointer;
        width: 20px;
        height: 20px;
        margin-bottom: 5px;
      }

      .colors button:nth-of-type(1) {
        background-color: rgb(255, 0, 0);
      }

      .colors button:nth-of-type(2) {
        background-color: rgb(0, 255, 0);
      }

      .colors button:nth-of-type(3) {
        background-color: rgb(0, 0, 255);
      }

      .brushes {
        padding-top: 5px;
      }

      .brushes button {
        display: block;
        width: 100%;
        border: 0;
        border-radius: 0;
        background-color: #ece8e8;
        margin-bottom: 5px;
        padding: 5px;
        height: 30px;
        outline: none;
        position: relative;
        cursor: pointer;
      }

      .brushes button:after {
        height: 1px;
        display: block;
        background: #808080;
        content: "";
      }

      .brushes button:nth-of-type(1):after {
        height: 1px;
      }

      .brushes button:nth-of-type(2):after {
        height: 2px;
      }

      .brushes button:nth-of-type(3):after {
        height: 3px;
      }

      .buttons {
        height: 80px;
        padding-top: 10px;
      }

      .buttons button {
        display: block;
        width: 100%;
        border: 0;
        border-radius: 0;
        background-color: #ece8e8;
        margin-bottom: 5px;
        padding: 5px;
        height: 30px;
        outline: none;
        position: relative;
        cursor: pointer;
        font-size: 16px;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <button id="newCanvasButton" onclick="showCanvas()">
      Add new paint
    </button>

    <div id="colorPanel">
      <div class="colors">
        <button type="button" value="#0000ff"></button>
        <button type="button" value="#009fff"></button>
        <button type="button" value="#0fffff"></button>
      </div>
      <div class="brushes">
        <button type="button" value="1"></button>
        <button type="button" value="2"></button>
        <button type="button" value="3"></button>
      </div>
      <div class="buttons">
        <button id="clear" type="button">Clear</button>
        <button id="save" type="button">Save</button>
      </div>
    </div>

    <canvas id="newPaintCanvas" width="400" height="500"></canvas>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <img id="example_img" src="waseda.png" />
      </a-assets>

      <a-marker preset="hiro">
        <a-entity cursor="rayOrigin: mouse"></a-entity>
        <a-image
          src="#example_img"
          width="5"
          height="5"
          position="0 -15 0"
          rotation="-90 0 0"
          collide
        ></a-image>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
